server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index-web.html;

    # Serve Vue SPA - try files first, fall back to index for client-side routing
    location / {
        try_files $uri $uri/ /index-web.html;
    }

    # Static assets - aggressive caching (Vite produces content-hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy health endpoint
    location /health {
        proxy_pass http://workfox-backend:9123/health;
        proxy_set_header Host $host;
    }

    # Proxy version endpoint
    location /version {
        proxy_pass http://workfox-backend:9123/version;
        proxy_set_header Host $host;
    }

    # Proxy hook endpoints
    location /hook/ {
        proxy_pass http://workfox-backend:9123/hook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy for /ws
    location /ws {
        proxy_pass http://workfox-backend:9123/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-specific timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable buffering for real-time communication
        proxy_buffering off;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
}
